<!DOCTYPE html>
<html>
<head>
  <title>AirWatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    #status { color: #666; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>AirWatch — Delhi Air Quality</h1>
  <div id="status">Loading…</div>
  <canvas id="chart"></canvas>

  <script>
    async function loadData() {
      const res = await fetch('/cities/Delhi/history?hours=24');
      if (!res.ok) {
        document.getElementById('status').textContent = 'No data yet — let the scheduler run.';
        return;
      }
      const readings = await res.json();

      const labels = readings.map(r => new Date(r.timestamp).toLocaleTimeString());
      const pm25 = readings.map(r => r.pm25);

      document.getElementById('status').textContent =
        `Showing ${readings.length} readings. Latest PM2.5: ${pm25[pm25.length - 1]}`;

      new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'PM2.5 (µg/m³)',
            data: pm25,
            borderColor: '#e74c3c',
            tension: 0.3
          }]
        }
      });
    }
    loadData();
  </script>
</body>
</html>
